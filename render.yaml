services:
  - type: web
    name: smartsummarizer
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn smartsummarizer.web.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPADATA_API_KEY
        sync: false
      - key: ENV
        value: production
